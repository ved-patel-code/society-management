<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Society Manager — Frontend Mockup</title>
<style>
:root{
  --bg:#f4f6f9; --panel:#ffffff; --border:#e3e7ee; --text:#1b2430; --muted:#6b7688;
  --brand:#3457d5; --brand-dark:#233b9e; --brand-light:#eaefff;
  --ok:#1f9d55; --ok-bg:#e7f8ee; --warn:#b8860b; --warn-bg:#fff6df;
  --danger:#d13b3b; --danger-bg:#fdeaea; --info:#3457d5; --info-bg:#eaefff;
  --radius:10px; --shadow:0 1px 3px rgba(20,30,60,.06), 0 1px 2px rgba(20,30,60,.04);
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--text); font-size:14px; line-height:1.5;
}
a{color:var(--brand); text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
h1,h2,h3,h4{margin:0 0 4px 0; font-weight:600;}
p{margin:0 0 8px 0;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:#cfd6e2; border-radius:6px;}

/* ---------- Login ---------- */
.login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#3457d5,#1b2f8f);}
.login-card{width:380px; background:var(--panel); border-radius:16px; padding:36px 32px; box-shadow:0 20px 60px rgba(0,0,0,.25);}
.login-logo{width:44px;height:44px;border-radius:12px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;margin-bottom:16px;}
.login-card h1{font-size:20px;}
.login-card .sub{color:var(--muted); margin-bottom:22px; font-size:13px;}
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.03em;}
.field input,.field select,.field textarea{
  width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
  font-size:14px; background:#fbfcfe; color:var(--text); font-family:inherit;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand-light); border-color:var(--brand);}
.btn{
  display:inline-flex; align-items:center; gap:6px; justify-content:center;
  padding:9px 16px; border-radius:8px; border:1px solid transparent; font-size:13px; font-weight:600;
  background:var(--brand); color:#fff; transition:background .15s;
}
.btn:hover{background:var(--brand-dark);}
.btn.block{width:100%;}
.btn.secondary{background:#fff; color:var(--text); border-color:var(--border);}
.btn.secondary:hover{background:#f2f4f8;}
.btn.danger{background:var(--danger);}
.btn.danger:hover{background:#b32d2d;}
.btn.ghost{background:transparent; color:var(--brand); border:none; padding:6px 8px;}
.btn.ghost:hover{background:var(--brand-light);}
.btn.sm{padding:5px 10px; font-size:12px;}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.error-box{background:var(--danger-bg); color:var(--danger); padding:9px 12px; border-radius:8px; font-size:12.5px; margin-bottom:14px;}
.hint-users{margin-top:18px; padding-top:16px; border-top:1px solid var(--border); font-size:12px; color:var(--muted);}
.hint-users code{background:#f2f4f8; padding:1px 5px; border-radius:4px;}

/* ---------- Portal chooser ---------- */
.portal-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg);}
.portal-card{width:420px; background:var(--panel); border-radius:16px; padding:32px; box-shadow:var(--shadow); text-align:center;}
.portal-options{display:flex; gap:12px; margin-top:20px;}
.portal-opt{
  flex:1; border:1.5px solid var(--border); border-radius:12px; padding:22px 14px; background:#fff;
}
.portal-opt:hover{border-color:var(--brand); background:var(--brand-light);}
.portal-opt .ic{font-size:26px; margin-bottom:8px;}
.portal-opt .name{font-weight:700; text-transform:capitalize;}
.portal-opt .desc{font-size:11.5px; color:var(--muted); margin-top:4px;}

/* ---------- App shell ---------- */
.shell{display:flex; min-height:100vh;}
.sidebar{
  width:230px; flex-shrink:0; background:#151b30; color:#c6cbe0; display:flex; flex-direction:column;
  padding:18px 12px;
}
.sb-brand{display:flex; align-items:center; gap:10px; padding:6px 8px 20px 8px;}
.sb-brand .logo{width:32px;height:32px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.sb-brand .name{color:#fff; font-weight:700; font-size:14px;}
.sb-brand .portal-tag{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:#8891b5;}
.nav-group-label{font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:#5c6488; margin:14px 10px 6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:8px; color:#c6cbe0;
  font-size:13.5px; font-weight:500; margin-bottom:2px; cursor:pointer; border:none; background:transparent; width:100%; text-align:left;
}
.nav-item .ic{font-size:15px; width:18px; text-align:center;}
.nav-item:hover{background:#20284a; color:#fff;}
.nav-item.active{background:var(--brand); color:#fff;}
.sb-footer{margin-top:auto; padding-top:14px; border-top:1px solid #262e4d;}
.sb-user{display:flex; align-items:center; gap:9px; padding:8px; border-radius:8px;}
.sb-user .avatar{width:30px;height:30px;border-radius:50%;background:#3a4270;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.sb-user .who{overflow:hidden;}
.sb-user .who .n{color:#fff; font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.sb-user .who .r{font-size:11px; color:#8891b5;}
.sb-actions{display:flex; gap:6px; margin-top:8px;}
.sb-actions button{flex:1; font-size:11px; padding:6px; border-radius:6px; border:1px solid #2c355a; background:#1c2340; color:#c6cbe0;}
.sb-actions button:hover{background:#262f52; color:#fff;}

.main{flex:1; display:flex; flex-direction:column; min-width:0;}
.topbar{
  height:58px; background:var(--panel); border-bottom:1px solid var(--border); display:flex; align-items:center;
  justify-content:space-between; padding:0 22px; flex-shrink:0;
}
.topbar .title{font-size:16px; font-weight:700;}
.topbar .crumbs{font-size:12px; color:var(--muted); margin-top:1px;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.bell-wrap{position:relative; cursor:pointer;}
.bell{font-size:19px; padding:8px; border-radius:8px;}
.bell:hover{background:#f2f4f8;}
.badge{
  position:absolute; top:2px; right:2px; background:var(--danger); color:#fff; font-size:10px; font-weight:700;
  min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 3px;
}
.content{padding:22px 26px; overflow-y:auto; flex:1;}

/* ---------- Generic components ---------- */
.grid{display:grid; gap:16px;}
.stat-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:20px;}
.stat-card{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
.stat-card .label{font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:6px;}
.stat-card .value{font-size:24px; font-weight:700;}
.stat-card .sub{font-size:11.5px; color:var(--muted); margin-top:4px;}

.panel{background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:18px;}
.panel-head{display:flex; align-items:center; justify-content:space-between; padding:15px 18px; border-bottom:1px solid var(--border); gap:10px; flex-wrap:wrap;}
.panel-head h3{font-size:14.5px;}
.panel-head .desc{font-size:12px; color:var(--muted); margin-top:2px;}
.panel-body{padding:16px 18px;}
.panel-body.pad0{padding:0;}

table{width:100%; border-collapse:collapse; font-size:13px;}
th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); padding:10px 14px; border-bottom:1px solid var(--border); background:#fafbfd;}
td{padding:11px 14px; border-bottom:1px solid #eef1f6; vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.clickable:hover{background:#f7f9fc; cursor:pointer;}
.empty-row td{text-align:center; color:var(--muted); padding:26px; font-size:13px;}

.pill{display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:99px; font-size:11px; font-weight:700; text-transform:capitalize; white-space:nowrap;}
.pill.ok{background:var(--ok-bg); color:var(--ok);}
.pill.warn{background:var(--warn-bg); color:var(--warn);}
.pill.danger{background:var(--danger-bg); color:var(--danger);}
.pill.info{background:var(--info-bg); color:var(--info);}
.pill.muted{background:#eef0f4; color:var(--muted);}

.toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.toolbar select,.toolbar input{padding:7px 10px; border:1px solid var(--border); border-radius:7px; font-size:12.5px; background:#fff;}
.tabs{display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:16px;}
.tab{padding:9px 14px; font-size:13px; font-weight:600; color:var(--muted); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px;}
.tab.active{color:var(--brand); border-bottom-color:var(--brand);}
.tab:hover{color:var(--text);}

.modal-overlay{position:fixed; inset:0; background:rgba(15,20,35,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;}
.modal{background:#fff; border-radius:14px; width:480px; max-width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 25px 70px rgba(0,0,0,.3);}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border);}
.modal-head h3{font-size:15px;}
.modal-head button{background:none; border:none; font-size:18px; color:var(--muted); padding:4px;}
.modal-body{padding:18px 20px;}
.modal-foot{padding:14px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px;}

.timeline{list-style:none; margin:0; padding:0; border-left:2px solid var(--border); margin-left:6px;}
.timeline li{position:relative; padding:0 0 16px 18px;}
.timeline li:before{content:""; position:absolute; left:-6px; top:3px; width:10px; height:10px; border-radius:50%; background:var(--brand);}
.timeline li:last-child{padding-bottom:0;}
.timeline .t-status{font-weight:700; font-size:12.5px; text-transform:capitalize;}
.timeline .t-note{font-size:12.5px; color:var(--muted); margin-top:2px;}
.timeline .t-time{font-size:11px; color:#a7aec2; margin-top:2px;}

.notif-item{display:flex; gap:12px; padding:13px 16px; border-bottom:1px solid #eef1f6;}
.notif-item:last-child{border-bottom:none;}
.notif-ic{width:34px; height:34px; border-radius:9px; background:var(--brand-light); color:var(--brand); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;}
.notif-body{flex:1; min-width:0;}
.notif-body .n-title{font-weight:700; font-size:13px;}
.notif-body .n-text{font-size:12.5px; color:var(--muted); margin-top:2px;}
.notif-body .n-time{font-size:11px; color:#a7aec2; margin-top:4px;}

.empty-state{text-align:center; padding:50px 20px; color:var(--muted);}
.empty-state .ic{font-size:34px; margin-bottom:10px;}
.empty-state h4{color:var(--text); margin-bottom:4px;}

.notice-body-render p{margin:0 0 10px;}
.notice-body-render ul,.notice-body-render ol{margin:0 0 10px 18px;}

.rich-toolbar{display:flex; gap:4px; margin-bottom:6px; flex-wrap:wrap;}
.rich-toolbar button{padding:5px 9px; font-size:12px; border:1px solid var(--border); background:#fff; border-radius:6px;}
.rich-toolbar button:hover{background:#f2f4f8;}
[contenteditable]{min-height:110px; border:1px solid var(--border); border-radius:8px; padding:10px 12px; background:#fbfcfe; font-size:13.5px;}
[contenteditable]:focus{outline:2px solid var(--brand-light); border-color:var(--brand);}

.checklist{display:flex; align-items:center; gap:8px; font-size:13px; margin-bottom:8px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.helptext{font-size:11.5px; color:var(--muted); margin-top:4px;}
.badge-mod{font-size:10px; padding:2px 7px; border-radius:6px; background:#eef0f4; color:var(--muted); font-weight:700;}
.mock-tag{font-size:10px; color:#9aa2b8; font-family:ui-monospace,Consolas,monospace; margin-left:6px;}
.step-row{display:flex; align-items:center; gap:8px; margin-bottom:18px;}
.step{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted);}
.step .dot{width:22px; height:22px; border-radius:50%; background:#eef0f4; color:var(--muted); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;}
.step.active .dot{background:var(--brand); color:#fff;}
.step.done .dot{background:var(--ok); color:#fff;}
.step.active{color:var(--text); font-weight:700;}
.step-sep{width:24px; height:1px; background:var(--border);}
.file-chip{display:inline-flex; align-items:center; gap:6px; background:#eef0f4; padding:4px 10px; border-radius:7px; font-size:12px; margin:2px 4px 2px 0;}
.file-chip button{background:none;border:none;color:var(--muted);font-size:13px;padding:0;}
.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:8px; font-size:12.5px;}
.bar-row .lbl{width:90px; flex-shrink:0; color:var(--muted);}
.bar-track{flex:1; height:8px; background:#eef0f4; border-radius:5px; overflow:hidden;}
.bar-fill{height:100%; background:var(--brand); border-radius:5px;}
.bar-row .val{width:70px; text-align:right; font-weight:600;}
.toast{position:fixed; bottom:22px; right:22px; background:#1b2430; color:#fff; padding:11px 18px; border-radius:9px; font-size:13px; box-shadow:0 10px 30px rgba(0,0,0,.25); z-index:200;}
</style>
</head>

const ApiError = (code, message, details) => ({ __apiError: true, code, message, details: details || {} });

const mockApi = {
  // mocks POST /auth/login
  login(email, password){
    const u = DB.users.find(x => x.email.toLowerCase() === String(email).toLowerCase().trim());
    if (!u || !password) throw ApiError("authentication_error", "Invalid email or password.");
    return { user_ref: u.id, available_portals: u.available_portals, token_type: "bearer" };
  },

  // mocks GET /me?portal=
  me(userId, portal){
    const u = DB.users.find(x => x.id === userId);
    if (!u) throw ApiError("authentication_error", "Invalid token.");
    let active = null;
    if (portal && u.available_portals.includes(portal)) active = portal;
    else if (u.available_portals.length === 1) active = u.available_portals[0];
    const modules = active ? (u.modulesByPortal[active] || []) : [];
    const permissions = active ? (u.permsByPortal[active] || []) : [];
    const landing = active ? (u.landingByPortal[active] || null) : null;
    return {
      user: { id: u.id, email: u.email, full_name: u.full_name, phone: u.phone },
      active_society_id: DB.society.id,
      available_portals: u.available_portals,
      active_portal: active,
      modules, landing, permissions,
      onboarding_required: DB.society.status !== "active"
    };
  },

  // mocks GET /houses
  listHouses(filters){
    filters = filters || {};
    let items = DB.houses.slice();
    if (filters.status) items = items.filter(h => h.status === filters.status);
    if (filters.building_id) items = items.filter(h => h.building_id === Number(filters.building_id));
    items = items.map(h => ({...h, building_name: DB.buildings.find(b=>b.id===h.building_id)?.name}));
    return { items, total: items.length, page: 1, page_size: 50 };
  },

  // mocks GET /houses/{id}
  getHouse(houseId){
    const house = DB.houses.find(h => h.id === houseId);
    if (!house) throw ApiError("not_found", "House not found.", { house_id: houseId });
    const owner = DB.occupancies.find(o => o.house_id === houseId && o.party_type === "owner" && o.is_current) || null;
    const tenant = house.status === "rented" ? (DB.occupancies.find(o => o.house_id === houseId && o.party_type === "tenant" && o.is_current) || null) : null;
    return { house, owner, tenant };
  },

  // mocks GET /houses/{id}/history
  houseHistory(houseId){
    return DB.houseHistory[houseId] || [];
  },

  // mocks POST /houses/{id}/status
  changeHouseStatus(houseId, payload){
    const house = DB.houses.find(h => h.id === houseId);
    if (!house) throw ApiError("not_found", "House not found.", { house_id: houseId });
    if (payload.to_status === "empty") throw ApiError("conflict", "A house can never return to empty.");
    if (!["owned","rented","to_let","for_sale"].includes(payload.to_status)) throw ApiError("validation_error", "Unknown target status.");
    if (payload.to_status === "owned" && (payload.owner.persons_living === null || payload.owner.persons_living === undefined))
      throw ApiError("validation_error", "persons_living is required for owned.");
    if (["to_let","for_sale"].includes(payload.to_status) && payload.owner.persons_living != null)
      throw ApiError("validation_error", "persons_living is not captured for to_let/for_sale.");
    if (payload.to_status === "rented" && !payload.tenant) throw ApiError("validation_error", "tenant is required for rented.");
    if (payload.to_status === "rented" && (payload.tenant.persons_living === null || payload.tenant.persons_living === undefined))
      throw ApiError("validation_error", "persons_living is required for the tenant.");

    const from = house.status;
    house.status = payload.to_status;
    if (!house.first_left_empty_on && from === "empty") house.first_left_empty_on = todayISO();

    // close existing occupancies, open new
    DB.occupancies.filter(o => o.house_id === houseId && o.is_current).forEach(o => { if (o.party_type === "owner" || (o.party_type === "tenant" && payload.to_status !== "rented")) o.is_current = false; });
    let owner = DB.occupancies.find(o => o.house_id === houseId && o.party_type === "owner" && o.is_current);
    if (owner) Object.assign(owner, payload.owner);
    else { owner = { id: nextId(), house_id: houseId, party_type: "owner", user_id: null, is_current: true, valid_from: todayISO(), ...payload.owner }; DB.occupancies.push(owner); }

    if (payload.to_status === "rented" && payload.tenant){
      let tenant = DB.occupancies.find(o => o.house_id === houseId && o.party_type === "tenant" && o.is_current);
      if (tenant) Object.assign(tenant, payload.tenant);
      else { tenant = { id: nextId(), house_id: houseId, party_type: "tenant", user_id: null, is_current: true, valid_from: todayISO(), ...payload.tenant }; DB.occupancies.push(tenant); }
    }

    if (from !== payload.to_status){
      if (!DB.houseHistory[houseId]) DB.houseHistory[houseId] = [];
      DB.houseHistory[houseId].unshift({ id: nextId(), from_status: from, to_status: payload.to_status, changed_by: CURRENT.userId, changed_at: nowISO(), note: null });
    }
    return this.getHouse(houseId);
  },

  // mocks GET /finance/rate
  getRate(){ return DB.financeRate; },
  // mocks POST /finance/rate
  setRate(amount, validFrom){
    if (Number(amount) <= 0) throw ApiError("validation_error", "amount must be positive.");
    if (DB.financeRate.history.some(r => r.valid_from === validFrom)) throw ApiError("conflict", "A rate already exists for this effective month.", { valid_from: validFrom });
    const r = { id: nextId(), amount: Number(amount).toFixed(2), valid_from: validFrom, created_at: nowISO() };
    DB.financeRate.history.unshift(r);
    DB.financeRate.current = r;
    return r;
  },
  // mocks GET /finance/houses/{id}/dues
  houseDues(houseId){
    const all = DB.houseDues.filter(d => d.house_id === houseId).sort((a,b)=> (a.period_year-b.period_year)||(a.period_month-b.period_month));
    const outstanding = all.filter(d => d.status === "outstanding").map(d => ({...d, is_overdue: new Date(d.due_date) < new Date(todayISO())}));
    const outstanding_total = outstanding.reduce((s,d)=>s+Number(d.amount_due),0);
    return { house_id: houseId, outstanding, outstanding_total: outstanding_total.toFixed(2), history: all.map(d=>({...d, is_overdue: d.status==="outstanding" && new Date(d.due_date) < new Date(todayISO())})) };
  },
  // mocks POST /finance/houses/{id}/payments
  recordPayment(houseId, payload){
    const outstanding = DB.houseDues.filter(d => d.house_id === houseId && d.status === "outstanding").sort((a,b)=> (a.period_year-b.period_year)||(a.period_month-b.period_month));
    if (!outstanding.length) throw ApiError("validation_error", "This house has no outstanding dues.");
    const n = payload.pay_all ? outstanding.length : Math.min(payload.months, outstanding.length);
    if (!payload.pay_all && payload.months > outstanding.length) throw ApiError("validation_error", "Requested months exceed the outstanding count.", { requested: payload.months, outstanding: outstanding.length });
    const settle = outstanding.slice(0, n);
    let amount = 0;
    settle.forEach(d => { d.status = "paid"; d.paid_at = nowISO(); amount += Number(d.amount_due); });
    const pay = { id: nextId(), house_id: houseId, amount: amount.toFixed(2), method: payload.method, reference: payload.reference||null, provider: "admin_manual", status: "recorded", paid_at: nowISO(), voided_at: null, void_reason: null };
    DB.payments.unshift(pay);
    DB.reserveLedger.unshift({ id: nextId(), entry_type: "collection", direction: "inflow", amount: pay.amount, description: null, occurred_on: todayISO(), source_type: "payment", source_id: pay.id, is_reversed: false });
    return pay;
  },
  // mocks GET /finance/expense-categories
  expenseCategories(){ return DB.expenseCategories; },
  // mocks GET /finance/expenses
  expenses(){ return { items: DB.expenses, total: DB.expenses.length }; },
  // mocks POST /finance/expenses
  addExpense(payload){
    if (!DB.expenseCategories.find(c=>c.id===Number(payload.category_id))) throw ApiError("not_found", "Expense category not found.");
    const e = { id: nextId(), category_id: Number(payload.category_id), amount: Number(payload.amount).toFixed(2), description: payload.description||null, incurred_on: payload.incurred_on, status: "recorded", void_reason: null };
    DB.expenses.unshift(e);
    DB.reserveLedger.unshift({ id: nextId(), entry_type: "expense", direction: "outflow", amount: e.amount, description: e.description, occurred_on: e.incurred_on, source_type: "expense", source_id: e.id, is_reversed: false });
    return e;
  },
  // mocks GET /finance/reserve
  reserve(){
    const balance = DB.reserveLedger.reduce((s,e)=> s + (e.direction==="inflow"?1:-1)*Number(e.amount), 0);
    return { balance: balance.toFixed(2), entries: DB.reserveLedger, total: DB.reserveLedger.length };
  },
  // mocks GET /finance/analytics/collection
  analyticsCollection(){
    const expected = DB.houseDues.reduce((s,d)=>s+Number(d.amount_due),0);
    const collected = DB.houseDues.filter(d=>d.status==="paid").reduce((s,d)=>s+Number(d.amount_due),0);
    return { expected: expected.toFixed(2), collected: collected.toFixed(2), outstanding: (expected-collected).toFixed(2) };
  },
  // mocks GET /finance/analytics/arrears
  analyticsArrears(){
    const byHouse = {};
    DB.houseDues.filter(d=>d.status==="outstanding").forEach(d=>{
      byHouse[d.house_id] = byHouse[d.house_id] || { house_id: d.house_id, outstanding_total: 0, months_outstanding: 0 };
      byHouse[d.house_id].outstanding_total += Number(d.amount_due);
      byHouse[d.house_id].months_outstanding += 1;
    });
    const houses = Object.values(byHouse).map(h=>({...h, outstanding_total: h.outstanding_total.toFixed(2)}));
    return { total_outstanding: houses.reduce((s,h)=>s+Number(h.outstanding_total),0).toFixed(2), houses };
  },

  // mocks POST /complaints/{id}/withdraw

    if (!allowed[c.status] || !allowed[c.status].includes(toStatus))

    const from = c.status;

      status: payload.publish ? "published" : "draft", is_pinned: !!payload.is_pinned,
      published_at: payload.publish ? nowISO() : null, expires_at: payload.expires_at || null,
      last_edited_at: null, created_by: CURRENT.userId, withdrawn_at: null, attachments: [], readBy: []
    };
    DB.notices.unshift(n);
    if (payload.publish) notifyAllResidents("notice", "New notice published", n.title, "notice", n.id);
    return n;
  },
  // mocks POST /notices/{id}/publish
  publishNotice(id){
    const n = DB.notices.find(x=>x.id===id);
    if (!n) throw ApiError("not_found", "Notice not found.");
    if (n.status !== "draft") throw ApiError("conflict", `Cannot move a notice from '${n.status}' to 'published'.`, { from_status: n.status, to_status: "published" });
    n.status = "published"; n.published_at = nowISO();
    notifyAllResidents("notice", "New notice published", n.title, "notice", n.id);
    return n;
  },
  // mocks POST /notices/{id}/withdraw
  withdrawNotice(id){
    const n = DB.notices.find(x=>x.id===id);
    if (!n) throw ApiError("not_found", "Notice not found.");
    if (n.status === "withdrawn") throw ApiError("conflict", "Cannot move a notice from 'withdrawn' to 'withdrawn'.");
    n.status = "withdrawn"; n.withdrawn_at = nowISO();
    return n;
  },
  // mocks PATCH /notices/{id}  (pin toggle etc.)
  updateNotice(id, patch){
    const n = DB.notices.find(x=>x.id===id);
    if (!n) throw ApiError("not_found", "Notice not found.");
    if (n.status === "withdrawn") throw ApiError("conflict", "A withdrawn notice cannot be edited.", { status: "withdrawn" });
    Object.assign(n, patch);
    return n;
  },
  // mocks GET /notices/{id} (also marks read)
  openNotice(id, userId){
    const n = DB.notices.find(x=>x.id===id);
    if (!n) throw ApiError("not_found", "Notice not found.");
    if (!n.readBy.includes(userId)) n.readBy.push(userId);
    clearRelatedNotifications(userId, "notice", id);
    return n;
  },
  // mocks GET /notices/{id}/receipts
  noticeReceipts(id){
    const n = DB.notices.find(x=>x.id===id);
    const owners = DB.occupancies.filter(o=>o.party_type==="owner" && o.is_current && o.user_id).map(o=>o.user_id);
    const uniqueOwners = [...new Set(owners)];
    const read = uniqueOwners.filter(u => n.readBy.includes(u));
    const unread = uniqueOwners.filter(u => !n.readBy.includes(u));
    return { notice_id: id, total_owners: uniqueOwners.length, read_count: read.length, unread_count: unread.length, read, unread };
  },

  // mocks GET /notifications
  listNotifications(userId){
    const items = DB.notifications.filter(n => n.for_user === userId && !n.read).sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
    return { items, unread_count: items.length };
  },
  unreadCount(userId){ return DB.notifications.filter(n=>n.for_user===userId && !n.read).length; },
  // mocks POST /notifications/{id}/read
  markRead(id){
    const n = DB.notifications.find(x=>x.id===id);
    if (!n) throw ApiError("not_found", "Notification not found.");
    const already = n.read; n.read = true;
    return { cleared: already ? 0 : 1 };
  },
  // mocks POST /notifications/read-all
  markAllRead(userId){
    let cleared = 0;
    DB.notifications.filter(n=>n.for_user===userId && !n.read).forEach(n=>{ n.read = true; cleared++; });
    return { cleared };
  }
};

function notifyAllResidents(type, title, body, entityType, entityId){
  DB.users.forEach(u => {
    if (u.available_portals.includes("resident")){
      DB.notifications.unshift({ id: nextId(), type, title, body, entity_type: entityType, entity_id: entityId, created_at: nowISO(), for_user: u.id, read: false });
    }
  });
}
function clearRelatedNotifications(userId, entityType, entityId){
  DB.notifications.filter(n => n.for_user===userId && n.entity_type===entityType && n.entity_id===entityId && !n.read).forEach(n=>n.read=true);
}
function stripTags(html){ const d = document.createElement("div"); d.innerHTML = html; return d.textContent || ""; }
function sanitizeBody(html){
  // naive allow-list sanitizer, illustrative only (mirrors notice-board.md's nh3 allow-list intent)
  const allowed = ["P","BR","SPAN","STRONG","B","EM","I","U","S","UL","OL","LI","A","H1","H2","H3","H4","BLOCKQUOTE","CODE","PRE","HR"];
  const d = document.createElement("div"); d.innerHTML = html;
  (function clean(node){
    [...node.children].forEach(el => {
      if (!allowed.includes(el.tagName)){ el.replaceWith(...el.childNodes); }
      else {
        [...el.attributes].forEach(attr => {
          if (el.tagName === "A" && ["href","title"].includes(attr.name)) return;
          el.removeAttribute(attr.name);
        });
        clean(el);
      }
    });
  })(d);
  return d.innerHTML;
}
function todayISO(){ return CLOCK.toISOString().slice(0,10); }
function nowISO(){ return CLOCK.toISOString(); }
// fixed mock "now" so the demo data (dues, expiry) stays consistent across a session
const CLOCK = new Date("2026-07-13T12:00:00Z");

const CURRENT = { userId: null, portal: null, me: null };

function login(email, password){

    setPortal(u.available_portals[0]);

function setPortal(portal){
  CURRENT.portal = portal;
  CURRENT.me = mockApi.me(CURRENT.userId, portal);
  location.hash = "#/" + (CURRENT.me.landing || "dashboard");
}
function logout(){
  CURRENT.userId = null; CURRENT.portal = null; CURRENT.me = null;
  location.hash = "#/login";
}
function currentUser(){ return DB.users.find(u=>u.id===CURRENT.userId); }
function has(perm){ return CURRENT.me && CURRENT.me.permissions.includes(perm); }
function hasModule(mod){ return CURRENT.me && CURRENT.me.modules.includes(mod); }

window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", () => { if (!location.hash) location.hash = "#/login"; render(); });

function route(){
  const h = location.hash.replace(/^#\//,"") || "login";
  const [path, param] = h.split("/");
  return { path, param };
}

function toast(msg){
  const t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

/* =========================================================================
   4. RENDER — top-level dispatcher
   ========================================================================= */
function render(){
  const app = document.getElementById("app");
  const { path, param } = route();

  if (!CURRENT.userId || path === "login"){
    app.innerHTML = renderLogin();
    wireLogin();
    return;
  }
  if (path === "choose-portal" || !CURRENT.portal){
    app.innerHTML = renderPortalChooser();
    wirePortalChooser();
    return;
  }
  CURRENT.me = mockApi.me(CURRENT.userId, CURRENT.portal); // refresh permission hints, like a real GET /me
  app.innerHTML = renderShell(path, param);
  wireShell(path, param);
}

/* ---------- Page dispatcher ---------- */
function renderPage(path, param){
  if (!hasModule(path) && path !== "dashboard") return renderForbidden();
  switch(path){
    case "dashboard": return CURRENT.portal === "admin" ? renderAdminDashboard() : renderResidentDashboard();
    case "onboarding": return renderOnboarding();
    case "houses": return renderHouses(param);
    case "myhouse": return renderMyHouse();
    case "finance": return renderFinance(param);
    case "complaints": return renderComplaints(param);
    case "notices": return renderNotices(param);
    case "notifications": return renderNotifications();
    default: return `<div class="empty-state"><div class="ic">❓</div><h4>Page not found</h4></div>`;
  }
}
function wirePage(path, param){
  if (!hasModule(path) && path !== "dashboard") return;
  switch(path){
    case "dashboard": return CURRENT.portal === "admin" ? wireAdminDashboard() : wireResidentDashboard();
    case "onboarding": return wireOnboarding();
    case "houses": return wireHouses(param);
    case "myhouse": return wireMyHouse();
    case "finance": return wireFinance(param);
    case "complaints": return wireComplaints(param);
    case "notices": return wireNotices(param);
    case "notifications": return wireNotifications();
  }
}

}

function statusPill(status){
  const map = {
    empty: "muted", owned: "ok", rented: "info", to_let: "warn", for_sale: "warn",
    open: "danger", in_progress: "warn", resolved: "ok", closed: "muted", withdrawn: "muted", archived: "muted",
    draft: "muted", published: "ok",
    outstanding: "danger", paid: "ok", recorded: "ok", voided: "muted"
  };
  return `<span class="pill ${map[status]||'muted'}">${status.replace(/_/g," ")}</span>`;
}
function fmtDate(iso){ if(!iso) return "—"; const d = new Date(iso); return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}) + " " + d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"}); }
function fmtDateOnly(iso){ if(!iso) return "—"; return new Date(iso).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"}); }

        <tbody>${d.history.map(x=>`<tr><td>${x.period_month}/${x.period_year}</td><td>₹${x.amount_due}</td><td>${statusPill(x.status)}</td></tr>`).join("")}</tbody></table>
      </div>
    </div>`;
}
function wireMyHouse(){}

function renderResidentFinance(){
  const u = currentUser();
  if (!u.houseId) return `<div class="empty-state"><div class="ic">💰</div><h4>No house linked</h4></div>`;
  const d = mockApi.houseDues(u.houseId);
  return `
    <div class="stat-row">
      <div class="stat-card"><div class="label">Outstanding total</div><div class="value">₹${d.outstanding_total}</div></div>
      <div class="stat-card"><div class="label">Months pending</div><div class="value">${d.outstanding.length}</div></div>
    </div>

      <div class="panel-head"><h3>Dues history</h3><div class="desc">finance.read — resident may view own house's dues only</div></div>

        <table><thead><tr><th>Period</th><th>Amount</th><th>Status</th><th>Paid on</th></tr></thead>
        <tbody>${d.history.map(x=>`<tr><td>${x.period_month}/${x.period_year}</td><td>₹${x.amount_due}</td><td>${statusPill(x.status)}</td><td>${x.paid_at?fmtDateOnly(x.paid_at):"—"}</td></tr>`).join("")}</tbody></table>
      </div>
    </div>`;
}
function wireResidentFinance(){}

/* =========================================================================
   7. COMPLAINTS (shared, behavior varies by permissions)
   ========================================================================= */
let complaintsFilter = { status: "" };
function renderComplaints(param){
  if (param) return renderComplaintDetail(Number(param));
  const isAdminView = has("complaints.read_all");
  const u = currentUser();
  const scope = isAdminView ? null : { houseIds: DB.houses.filter(h=>DB.occupancies.some(o=>o.house_id===h.id && o.user_id===u.id && o.is_current)).map(h=>h.id) };
  const { items } = mockApi.listComplaints(complaintsFilter, scope);
  return `
    <div class="panel">
      <div class="panel-head">
        <div><h3>Complaints</h3><div class="desc">GET /complaints — ${isAdminView?'complaints.read_all (society-wide)':'complaints.read (own house only)'}</div></div>
        <div class="toolbar">
          <select id="cf-status"><option value="">All statuses</option>${["open","in_progress","resolved","closed","withdrawn","archived"].map(s=>`<option value="${s}" ${complaintsFilter.status===s?'selected':''}>${s}</option>`).join("")}</select>
          ${has("complaints.create") ? `<button class="btn sm" id="raise-complaint-btn">Raise complaint</button>` : ""}
        </div>
      </div>
      <div class="panel-body pad0">
        <table>
          <thead><tr><th>Reference</th><th>Title</th><th>House</th><th>Category</th><th>Status</th><th>Updated</th></tr></thead>
          <tbody>
            ${items.length ? items.map(c=>`
              <tr class="clickable" data-complaint="${c.id}">
                <td>${c.reference}</td><td>${c.title}</td><td>${c.house_display_code||"—"}</td><td>${c.category_name}</td><td>${statusPill(c.status)}</td><td>${fmtDate(c.updated_at)}</td>
              </tr>`).join("") : `<tr class="empty-row"><td colspan="6">No complaints found.</td></tr>`}
          </tbody>
        </table>
      </div>
    </div>`;
}
function wireComplaints(param){
  if (param) return wireComplaintDetail(Number(param));
  document.getElementById("cf-status").addEventListener("change", e=>{ complaintsFilter.status = e.target.value; refreshContent("complaints"); });
  const raise = document.getElementById("raise-complaint-btn"); if (raise) raise.addEventListener("click", openRaiseComplaintModal);
  document.querySelectorAll("[data-complaint]").forEach(el=>el.addEventListener("click", ()=>{ location.hash = "#/complaints/"+el.dataset.complaint; }));
}
function openRaiseComplaintModal(){
  const cats = mockApi.complaintCategories();
  const modal = document.createElement("div"); modal.className="modal-overlay";
  modal.innerHTML = `<div class="modal"><div class="modal-head"><h3>Raise a complaint <span class="mock-tag">POST /complaints</span></h3><button data-close>✕</button></div>
    <div class="modal-body"><div id="rc-error"></div>
      <div class="field"><label>Category</label><select id="rc-cat">${cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}</select></div>
      <div class="field"><label>Title</label><input id="rc-title" placeholder="Short summary"></div>
      <div class="field"><label>Description</label><textarea id="rc-desc" rows="4" placeholder="Describe the issue in detail"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn secondary" data-close>Cancel</button><button class="btn" id="rc-submit">Submit</button></div></div>`;
  document.body.appendChild(modal);
  modal.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", ()=>modal.remove()));
  modal.querySelector("#rc-submit").addEventListener("click", ()=>{
    const u = currentUser();
    const title = modal.querySelector("#rc-title").value.trim();
    const desc = modal.querySelector("#rc-desc").value.trim();
    if (!title || !desc){ modal.querySelector("#rc-error").innerHTML = `<div class="error-box">Title and description are required.</div>`; return; }
    try{
      const c = mockApi.createComplaint({ category_id: modal.querySelector("#rc-cat").value, title, description: desc }, u.id, u.houseId);
      notifyAdmins("complaint_new", "New complaint raised", `${c.reference} — ${c.title} (${c.house_display_code})`, "complaint", c.id);
      modal.remove(); toast("Complaint raised"); location.hash = "#/complaints";
      refreshContent("complaints");
    }catch(err){ modal.querySelector("#rc-error").innerHTML = `<div class="error-box">${err.message}</div>`; }
  });
}
function notifyAdmins(type,title,body,entityType,entityId){
  DB.users.forEach(u=>{ if (u.available_portals.includes("admin")) DB.notifications.unshift({ id: nextId(), type, title, body, entity_type: entityType, entity_id: entityId, created_at: nowISO(), for_user: u.id, read: false }); });
}
function renderComplaintDetail(id){
  const c = mockApi.getComplaint(id);
  const u = currentUser();
  const isRaiser = c.raised_by === u.id;
  const isAdmin = has("complaints.update_status");
  return `
    <button class="btn ghost sm" id="back-to-list" style="margin-bottom:12px;">← Back to complaints</button>
    <div class="panel">
      <div class="panel-head">
        <div><h3>${c.title}</h3><div class="desc">${c.reference} · ${c.house_display_code} · ${c.category_name}</div></div>
        ${statusPill(c.status)}
      </div>
      <div class="panel-body">
        <p>${c.description}</p>
        <div style="display:flex; gap:8px; margin:14px 0; flex-wrap:wrap;">
          ${isRaiser && c.status==='open' ? `<button class="btn secondary sm" id="withdraw-btn">Withdraw</button>` : ""}
          ${isAdmin && c.status==='open' ? `<button class="btn sm" id="start-progress-btn">Start progress</button>` : ""}
          ${isAdmin && c.status==='in_progress' ? `<button class="btn sm" id="resolve-btn">Resolve with proof</button>` : ""}
          ${isAdmin && c.status==='resolved' ? `<button class="btn sm" id="close-btn">Close</button><button class="btn secondary sm" id="reopen-btn">Reopen</button>` : ""}
        </div>
        <h4 style="font-size:12px; text-transform:uppercase; color:var(--muted); margin-top:16px;">Timeline</h4>
        <ul class="timeline">
          ${c.timeline.map(t=>`<li><div class="t-status">${t.from_status?`${t.from_status} → `:''}${t.to_status}</div>${t.note?`<div class="t-note">${t.note}</div>`:''}<div class="t-time">${fmtDate(t.created_at)}</div></li>`).join("")}
        </ul>
        ${c.images.length ? `<h4 style="font-size:12px; text-transform:uppercase; color:var(--muted); margin-top:16px;">Images</h4>${c.images.map(i=>`<span class="file-chip">${i.kind==='proof'?'📎':'🖼️'} ${i.filename||('doc-'+i.vault_document_id)}</span>`).join("")}` : ""}
      </div>
    </div>`;
}
function wireComplaintDetail(id){
  document.getElementById("back-to-list").addEventListener("click", ()=>{ location.hash="#/complaints"; });
  const w = document.getElementById("withdraw-btn"); if (w) w.addEventListener("click", ()=>{ try{ mockApi.withdrawComplaint(id, currentUser().id); toast("Complaint withdrawn"); refreshContent("complaints", String(id)); }catch(e){ toast(e.message); } });
  const sp = document.getElementById("start-progress-btn"); if (sp) sp.addEventListener("click", ()=>{ mockApi.changeComplaintStatus(id, "in_progress", "Acknowledged, looking into it."); toast("Moved to in progress"); refreshContent("complaints", String(id)); });
  const rs = document.getElementById("resolve-btn"); if (rs) rs.addEventListener("click", ()=>openResolveModal(id));
  const cl = document.getElementById("close-btn"); if (cl) cl.addEventListener("click", ()=>{ mockApi.changeComplaintStatus(id, "closed"); toast("Complaint closed"); refreshContent("complaints", String(id)); });
  const ro = document.getElementById("reopen-btn"); if (ro) ro.addEventListener("click", ()=>{ mockApi.changeComplaintStatus(id, "in_progress", "Reopened for further work."); toast("Reopened"); refreshContent("complaints", String(id)); });
}
function openResolveModal(id){
  const modal = document.createElement("div"); modal.className="modal-overlay";
  modal.innerHTML = `<div class="modal"><div class="modal-head"><h3>Resolve complaint <span class="mock-tag">POST /complaints/${id}/resolve</span></h3><button data-close>✕</button></div>
    <div class="modal-body">
      <div class="field"><label>Note</label><textarea id="res-note" rows="3" placeholder="What was done to resolve this?"></textarea></div>
      <div class="field"><label>Proof image (optional)</label><input type="file" id="res-file"></div>
    </div>
    <div class="modal-foot"><button class="btn secondary" data-close>Cancel</button><button class="btn" id="res-submit">Mark resolved</button></div></div>`;
  document.body.appendChild(modal);
  modal.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", ()=>modal.remove()));
  modal.querySelector("#res-submit").addEventListener("click", ()=>{
    const file = modal.querySelector("#res-file").files[0];
    mockApi.resolveComplaint(id, modal.querySelector("#res-note").value, file ? [file.name] : []);
    modal.remove(); toast("Complaint resolved"); refreshContent("complaints", String(id));
  });
}

/* =========================================================================
   8. NOTICE BOARD
   ========================================================================= */
let noticesScope = "active";
function renderNotices(param){
  if (param) return renderNoticeDetail(Number(param));
  const isManager = has("notices.publish");
  const items = noticesScope === "archive" ? mockApi.archiveNotices() : mockApi.listNotices(isManager && noticesScope!=='mine' ? undefined : "active");
  const filtered = isManager ? (noticesScope==="draft" ? DB.notices.filter(n=>n.status==="draft") : items) : items;
  return `
    <div class="panel">
      <div class="panel-head">
        <div><h3>Notice Board</h3><div class="desc">GET /notices — ${isManager?'admin can filter by status/scope':'resident always sees the active feed'}</div></div>
        <div class="toolbar">
          ${isManager ? `
            <select id="nb-scope">
              <option value="active" ${noticesScope==='active'?'selected':''}>Active feed</option>
              <option value="draft" ${noticesScope==='draft'?'selected':''}>Drafts</option>
              <option value="archive" ${noticesScope==='archive'?'selected':''}>Archive</option>
            </select>
            <button class="btn sm" id="compose-notice-btn">Compose notice</button>
          ` : ""}
        </div>
      </div>
      <div class="panel-body pad0">
        ${filtered.length ? filtered.map(n=>`
          <div class="clickable" data-notice="${n.id}" style="padding:14px 18px; border-bottom:1px solid #eef1f6; display:flex; justify-content:space-between; align-items:center; gap:10px;">
            <div>
              <div style="font-weight:700; font-size:13.5px;">${n.is_pinned?'📌 ':''}${n.title}</div>
              <div style="font-size:11.5px; color:var(--muted); margin-top:3px;">
                ${n.status==='published'?`Published ${fmtDate(n.published_at)}`:n.status==='draft'?'Draft — not yet published':`Withdrawn ${fmtDate(n.withdrawn_at)}`}
                ${n.expires_at?` · expires ${fmtDateOnly(n.expires_at)}`:''} · ${n.attachments.length} attachment(s)
              </div>
            </div>
            <div style="display:flex; gap:6px; align-items:center;">
              ${statusPill(n.status)}
              ${!isManager && !n.readBy.includes(currentUser().id) ? `<span class="pill danger">unread</span>` : ""}
            </div>
          </div>`).join("") : `<div style="padding:30px; text-align:center; color:var(--muted);">No notices here.</div>`}
      </div>
    </div>
    ${!isManager ? `<div style="margin-top:10px;"><button class="btn secondary sm" id="mark-all-read-notices">Mark all as read</button></div>` : ""}
  `;
}
function wireNotices(param){
  if (param) return wireNoticeDetail(Number(param));
  const scopeSel = document.getElementById("nb-scope"); if (scopeSel) scopeSel.addEventListener("change", e=>{ noticesScope = e.target.value; refreshContent("notices"); });
  const compose = document.getElementById("compose-notice-btn"); if (compose) compose.addEventListener("click", openComposeNoticeModal);
  document.querySelectorAll("[data-notice]").forEach(el=>el.addEventListener("click", ()=>{ location.hash = "#/notices/"+el.dataset.notice; }));
  const markAll = document.getElementById("mark-all-read-notices"); if (markAll) markAll.addEventListener("click", ()=>{ DB.notices.forEach(n=>{ if(n.status==='published' && !n.readBy.includes(currentUser().id)) n.readBy.push(currentUser().id); }); toast("All notices marked read"); refreshContent("notices"); });
}
function openComposeNoticeModal(){
  const modal = document.createElement("div"); modal.className="modal-overlay";
  modal.innerHTML = `<div class="modal" style="width:560px;"><div class="modal-head"><h3>Compose notice <span class="mock-tag">POST /notices</span></h3><button data-close>✕</button></div>
    <div class="modal-body"><div id="cn-error"></div>
      <div class="field"><label>Title</label><input id="cn-title" placeholder="Notice title"></div>
      <div class="field"><label>Body</label>
        <div class="rich-toolbar">
          <button type="button" data-cmd="bold"><b>B</b></button>
          <button type="button" data-cmd="italic"><i>I</i></button>
          <button type="button" data-cmd="insertUnorderedList">• List</button>
        </div>
        <div id="cn-body" contenteditable="true">Write your notice here...</div>
        <div class="helptext">Sanitized server-side on submit — only a safe tag allow-list survives (per notice-board.md).</div>
      </div>
      <div class="field-row">
        <div class="field"><label>Expires at (optional)</label><input id="cn-expires" type="datetime-local"></div>
        <div class="field"><label>&nbsp;</label><div class="checklist"><input type="checkbox" id="cn-pin"><label for="cn-pin">Pin to top</label></div></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn secondary" data-close>Cancel</button>
      <button class="btn secondary" id="cn-draft">Save as draft</button>
      <button class="btn" id="cn-publish">Publish</button>
    </div></div>`;
  document.body.appendChild(modal);
  modal.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click", ()=>modal.remove()));
  modal.querySelectorAll("[data-cmd]").forEach(b=>b.addEventListener("click", ()=>{ document.execCommand(b.dataset.cmd); modal.querySelector("#cn-body").focus(); }));
  const submit = (publish)=>{
    const title = modal.querySelector("#cn-title").value.trim();
    const body = modal.querySelector("#cn-body").innerHTML;
    if (!title){ modal.querySelector("#cn-error").innerHTML = `<div class="error-box">Title is required.</div>`; return; }
    try{
      mockApi.createNotice({ title, body, is_pinned: modal.querySelector("#cn-pin").checked, expires_at: modal.querySelector("#cn-expires").value || null, publish });
      modal.remove(); toast(publish?"Notice published":"Draft saved"); refreshContent("notices");
    }catch(err){ modal.querySelector("#cn-error").innerHTML = `<div class="error-box">${err.message}</div>`; }
  };
  modal.querySelector("#cn-draft").addEventListener("click", ()=>submit(false));
  modal.querySelector("#cn-publish").addEventListener("click", ()=>submit(true));
}
function renderNoticeDetail(id){
  const isManager = has("notices.publish");
  let n;
  try{ n = mockApi.openNotice(id, currentUser().id); }
  catch(e){ return `<div class="empty-state"><div class="ic">🔍</div><h4>Notice not found</h4></div>`; }
  const receipts = isManager && has("notices.read_receipts") ? mockApi.noticeReceipts(id) : null;
  return `
    <button class="btn ghost sm" id="back-to-notices" style="margin-bottom:12px;">← Back to notices</button>
    <div class="panel">
      <div class="panel-head">
        <div><h3>${n.is_pinned?'📌 ':''}${n.title}</h3><div class="desc">${n.status==='published'?`Published ${fmtDate(n.published_at)}`:n.status}</div></div>
        ${statusPill(n.status)}
      </div>
      <div class="panel-body">
        <div class="notice-body-render">${n.body}</div>
        ${n.attachments.length ? `<div style="margin-top:12px;">${n.attachments.map(a=>`<span class="file-chip">📎 ${a.filename}</span>`).join("")}</div>` : ""}
        ${isManager ? `
        <div style="display:flex; gap:8px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border);">
          ${n.status==='draft' ? `<button class="btn sm" id="publish-notice-btn">Publish</button>` : ""}
          ${n.status!=='withdrawn' ? `<button class="btn secondary sm" id="withdraw-notice-btn">Withdraw</button>` : ""}
          ${n.status==='published' ? `<button class="btn secondary sm" id="pin-notice-btn">${n.is_pinned?'Unpin':'Pin'}</button>` : ""}
        </div>` : ""}
      </div>
    </div>
    ${receipts ? `
    <div class="panel">
      <div class="panel-head"><h3>Read receipts</h3><div class="desc">GET /notices/${id}/receipts — scoped to current owners</div></div>
      <div class="panel-body">
        <div class="bar-row"><div class="lbl">Read</div><div class="bar-track"><div class="bar-fill" style="width:${receipts.total_owners?(receipts.read_count/receipts.total_owners*100).toFixed(0):0}%; background:var(--ok);"></div></div><div class="val">${receipts.read_count}/${receipts.total_owners}</div></div>
      </div>
    </div>` : ""}
  `;
}
function wireNoticeDetail(id){
  document.getElementById("back-to-notices").addEventListener("click", ()=>{ location.hash="#/notices"; });
  const pub = document.getElementById("publish-notice-btn"); if (pub) pub.addEventListener("click", ()=>{ mockApi.publishNotice(id); toast("Notice published"); refreshContent("notices", String(id)); });
  const wd = document.getElementById("withdraw-notice-btn"); if (wd) wd.addEventListener("click", ()=>{ mockApi.withdrawNotice(id); toast("Notice withdrawn"); refreshContent("notices", String(id)); });
  const pin = document.getElementById("pin-notice-btn"); if (pin) pin.addEventListener("click", ()=>{ const n = DB.notices.find(x=>x.id===id); mockApi.updateNotice(id, { is_pinned: !n.is_pinned }); refreshContent("notices", String(id)); });
}

/* =========================================================================
   9. NOTIFICATIONS
   ========================================================================= */
const NOTIF_ICONS = { complaint_new:"🛠️", complaint_update:"🔄", complaint_withdrawn:"↩️", notice:"📣", maintenance_due:"💰" };
function renderNotifications(){
  const u = currentUser();
  const { items, unread_count } = mockApi.listNotifications(u.id);
  return `
    <div class="panel">
      <div class="panel-head">
        <div><h3>Notifications</h3><div class="desc">GET /notifications — unread-only feed</div></div>
        ${items.length ? `<button class="btn secondary sm" id="mark-all-notif-btn">Mark all read (${unread_count})</button>` : ""}
      </div>
      <div class="panel-body pad0">
        ${items.length ? items.map(n=>`
          <div class="notif-item">
            <div class="notif-ic">${NOTIF_ICONS[n.type]||"🔔"}</div>
            <div class="notif-body">
              <div class="n-title">${n.title}</div>
              <div class="n-text">${n.body}</div>
              <div class="n-time">${fmtDate(n.created_at)}</div>
            </div>
            <button class="btn ghost sm" data-mark-read="${n.id}">Mark read</button>
          </div>`).join("") : `<div class="empty-state"><div class="ic">🎉</div><h4>You're all caught up</h4></div>`}
      </div>
    </div>`;
}
function wireNotifications(){
  document.querySelectorAll("[data-mark-read]").forEach(b=>b.addEventListener("click", ()=>{ mockApi.markRead(Number(b.dataset.markRead)); refreshContent("notifications"); }));
  const markAll = document.getElementById("mark-all-notif-btn"); if (markAll) markAll.addEventListener("click", ()=>{ mockApi.markAllRead(currentUser().id); toast("All notifications cleared"); refreshContent("notifications"); });
}

</script>
